<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clara Marincowitz Photography</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .contact-page-wrapper {
            display: flex;
            gap: 10px;
            max-width: 1000px;
            /*margin: 2rem auto;*/
            max-width: 100%;
            padding: 0 20px;
        }

        .contact-photo {
            flex: 1;
            max-width: 450px;
        }

        .contact-photo img {
            width: 100%;
            height: auto;
            border-radius: 0;
            object-fit: cover;
            display: block;
        }

         .contact-container {
            flex: 1;
            max-width: none;
            width: 100%;
            padding: 2rem;
            background-color: rgba(199, 219, 191, 0.42);
        }

        .contact-form {
            display: grid;
            gap: 1rem;
        }

        .contact-form label {
            font-family: 'Work Sans', sans-serif;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            margin-top: 0.25rem;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: 'Work Sans', sans-serif;
            box-sizing: border-box; /* Ensures padding doesn't break the layout */
        }

        .contact-form textarea {
            height: 150px;
            resize: vertical;
        }

        .contact-form button {
            background-color: #75B071;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Work Sans', sans-serif;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .contact-form button:hover {
            background-color: #555;
        }

/* Mobile version */
        
    @media (max-width: 768px) {
        .contact-page-wrapper {
            flex-direction: column-reverse; /* Form goes on top, photo on bottom on mobile */
            padding: 0 20px; /* Aligns both elements nicely with the screen edges */
        }

        .contact-photo, .contact-container {
            max-width: 100%;
            width: 100%; /* Forces both to span the exact same full width */
            box-sizing: border-box; /* Ensures padding doesn't push the container wider than 100% */
        }

        .contact-container {
            padding: 1.5rem; /* Slightly reduced padding so it looks balanced on smaller screens */
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>CLARA M</h1>
                
                <nav>
                    <ul>
                        <li><a href="index.html">ABOUT</a></li>
                        <li><a href="gallery.html">GALLERY</a></li>
                        <li><a href="contact.html">CONTACT</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        
        <main>
            <div class="contact-page-wrapper">
                
                <div class="contact-photo">
                    <img src="images/contact/contact.jpg" alt="Clara Marincowitz Photography">
                </div>

                <div class="contact-container">
                    <form class="contact-form" action="https://formspree.io/f/xzzpbvbo" method="POST">
                        <div>
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="_replyto" required>
                        </div>
                        <div>
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" required></textarea>
                        </div>
                        <button type="submit">Send</button>
                    </form>
                </div>

            </div>
        </main>
        
    </div>
</body>
</html>
